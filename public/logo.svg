<svg width="160" height="44" viewBox="0 0 680 280"
role="img" xmlns="http://www.w3.org/2000/svg">

  <style>
    .brand { font-family: 'Plus Jakarta Sans',
    'DM Sans', sans-serif; font-weight: 800;
    font-size: 42px; fill: #F5F5F0;
    letter-spacing: -0.5px; }
    .sub-gold { fill: #C9A84C; }
  </style>

  <!-- Geometric M mark -->
  <g transform="translate(168, 80)">
    <polygon points="0,110 18,110 18,20 0,0"
    fill="#C9A84C" opacity="0.95"/>
    <polygon points="18,20 38,60 28,60 10,20"
    fill="#C9A84C" opacity="0.7"/>
    <polygon points="38,60 58,20 68,20 48,60"
    fill="#C9A84C" opacity="0.7"/>
    <polygon points="58,20 76,0 76,110 58,110"
    fill="#C9A84C" opacity="0.95"/>
    <polygon points="28,60 38,40 48,60 38,80"
    fill="#F5F5F0" opacity="0.15"/>
    <line x1="0" y1="118" x2="76" y2="118"
    stroke="#C9A84C" stroke-width="1.5"
    opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="290" y="158" class="brand">mat
    <tspan class="sub-gold" dx="2">.</tspan>
    <tspan fill="#C9A84C" font-weight="400"
    font-size="38px" dx="4" dy="2"
    font-family="'DM Sans', sans-serif"
    letter-spacing="1px">enseigne</tspan>
  </text>

  <!-- Rule -->
  <line x1="290" y1="178" x2="630" y2="178"
  stroke="#C9A84C" stroke-width="0.8"
  opacity="0.5"/>
</svg>
